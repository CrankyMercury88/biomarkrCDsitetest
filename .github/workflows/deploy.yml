name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Prepare deploy directory (exclude Founder's Notes)
        run: |
          mkdir -p _deploy
          rsync -av \
            --exclude='notes.html' \
            --exclude='notes.jsx' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_deploy' \
            . _deploy/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_deploy
          publish_branch: gh-pages
